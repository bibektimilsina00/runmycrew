version: 2
updates:
  # GitHub Actions (also keeps the CI action versions current)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Frontend (pnpm workspace)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend:
        patterns: ["*"]
    # Major bumps (zod 3->4, tailwind 3->4, react-router 6->7) are breaking and
    # must be done deliberately with UI verification — not auto-merged.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Backend Python (uv projects)
  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
  - package-ecosystem: "pip"
    directory: "/apps/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Docker base images (one entry per Dockerfile we publish)
  - package-ecosystem: "docker"
    directory: "/apps/api"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps-docker)"
  - package-ecosystem: "docker"
    directory: "/apps/worker"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps-docker)"
  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(deps-docker)"
