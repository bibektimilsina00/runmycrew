name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — ruff + migrations + pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: runmycrew
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"

      - name: Ruff lint
        run: uv run --project apps/api ruff check apps/api apps/worker

      - name: Ruff format check
        run: uv run --project apps/api ruff format --check apps/api apps/worker

      - name: Apply migrations
        working-directory: apps/api
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run alembic upgrade head

      - name: Migration drift check
        working-directory: apps/api
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: uv run alembic check

      - name: Pytest
        env:
          PYTHONPATH: .
        run: uv run --project apps/api python -m pytest apps/api/tests -q

      - name: Schema drift check
        env:
          PYTHONPATH: .
        run: uv run --project apps/api python scripts/check-schema-drift.py

      - name: Dependency audit (pip-audit)
        # Report-only for now (|| true): surfaces new Python advisories in
        # the logs without blocking. Flip to blocking once the backlog is
        # triaged to zero — tracked in the phase-4 hardening card.
        run: |
          uv export --project apps/api --format requirements-txt --no-emit-project > /tmp/reqs.txt
          uvx pip-audit -r /tmp/reqs.txt || true

  frontend:
    name: Frontend — typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter runmycrew-web exec tsc -b

      - name: Lint
        run: pnpm --filter runmycrew-web lint

      - name: Dependency audit (production deps)
        # Blocking: prod deps must stay at zero high. Non-reachable /
        # dev-only advisories are allowlisted with justification in
        # package.json → pnpm.auditConfig.ignoreGhsas.
        run: pnpm audit --prod --audit-level=high

      - name: Test
        run: pnpm --filter runmycrew-web test

      - name: Build
        run: pnpm --filter runmycrew-web build

  e2e-smoke:
    name: E2E smoke — auth + run + form vs compose stack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Bring up e2e stack
        run: docker compose -f docker-compose.e2e.yml up -d --build --wait

      - name: Smoke subset
        working-directory: apps/web
        run: pnpm e2e:smoke

      - name: Stack logs on failure
        if: failure()
        run: docker compose -f docker-compose.e2e.yml logs --tail 200 api worker

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7
