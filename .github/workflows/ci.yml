name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — ruff + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Ruff lint
        run: uv run --project apps/api ruff check apps/api apps/worker

      - name: Ruff format check
        run: uv run --project apps/api ruff format --check apps/api apps/worker

      - name: Pytest
        env:
          PYTHONPATH: .
        run: uv run --project apps/api python -m pytest apps/api/tests -q

  frontend:
    name: Frontend — typecheck + lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter web exec tsc -b

      - name: Lint
        run: pnpm --filter web lint

      - name: Build
        run: pnpm --filter web build
