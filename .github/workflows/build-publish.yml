# ─── Build + publish Fuse images to ghcr.io ────────────────────────────
#
# Builds the three production images in parallel on push to `main` and
# pushes them to GitHub Container Registry. Tags:
#   - latest              → tracks main
#   - sha-<short>         → pin in deploy/.env to roll back
#   - main                → same as latest, kept for debugging
#
# Pull requests build but do NOT push — catches Dockerfile breakage
# before merge.
#
# After the first run, mark each package public:
#   GitHub → repo → Packages → fuse-api  → Package settings → "Change visibility" → Public
#   ditto for fuse-worker, fuse-web
# ───────────────────────────────────────────────────────────────────────

name: build-publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "apps/web/**"
      - "pyproject.toml"
      - "uv.lock"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/build-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # One run per ref. New pushes cancel in-flight builds.
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: worker
            dockerfile: apps/worker/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fuse-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Push only on main + manual runs. PRs build to validate.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # buildx layer cache via Actions cache. First run cold, subsequent
          # runs ~70% faster.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          platforms: linux/amd64
          provenance: false
