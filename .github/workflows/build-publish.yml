# ─── Build · scan · publish Fuse images to ghcr.io ─────────────────────
#
# Triggered on push to main and on any PR that touches a Dockerfile,
# lockfile, or this workflow itself.
#
# Stages
#   1. Build the 3 images in parallel (api / worker / web) via buildx +
#      Actions layer cache. Push only on main; PRs build-only as a
#      breakage gate.
#   2. Generate SBOM + provenance attestations on each pushed image,
#      Sigstore-signed via the OIDC token Actions hands the runner.
#   3. Scan every pushed image with Trivy. Fails the workflow on
#      CRITICAL CVEs; uploads SARIF report to the GitHub Security tab.
#
# Tags
#   :latest        tracks main HEAD
#   :sha-<short>   immutable pin per commit (use for rollbacks)
#   :main          alias of :latest
#
# After the first successful push:
#   - GitHub → your profile → Packages → fuse-{api,worker,web}
#     → Package settings → Change visibility → Public
#     (or keep private + set GHCR_PAT in the deploy workflow secrets).
# ───────────────────────────────────────────────────────────────────────

name: build-publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/worker/**"
      - "apps/web/**"
      - "pyproject.toml"
      - "uv.lock"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/build-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  # Required by docker/build-push-action's attestation mode + by
  # actions/attest-build-provenance.
  id-token: write
  attestations: write
  # Trivy uploads SARIF; needs `security-events: write` for the GitHub
  # Security tab.
  security-events: write

concurrency:
  group: build-publish-${{ github.ref }}
  # Cancel superseded runs on PRs. DON'T cancel on main — every commit's
  # image should land in ghcr for rollback granularity.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: apps/api/Dockerfile
          - service: worker
            dockerfile: apps/worker/Dockerfile
          - service: web
            dockerfile: apps/web/Dockerfile

    # Exposes per-service digests so the scan job can pin the EXACT
    # image we pushed instead of racing against `:latest` re-tags.
    outputs:
      digest-api: ${{ steps.expose.outputs.digest-api }}
      digest-worker: ${{ steps.expose.outputs.digest-worker }}
      digest-web: ${{ steps.expose.outputs.digest-web }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fuse-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=fuse-${{ matrix.service }}
            org.opencontainers.image.description=Fuse ${{ matrix.service }} container
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.url=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=Bibek Timilsina

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # buildx layer cache via Actions cache.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          platforms: linux/amd64
          # SBOM + provenance baked into the image manifest. Sigstore-
          # signed via the OIDC token Actions hands the runner. Both
          # ride along with `docker pull` so consumers see them.
          provenance: mode=max
          sbom: true

      - name: Expose digest for scan job
        id: expose
        if: github.event_name != 'pull_request'
        run: |
          echo "digest-${{ matrix.service }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/fuse-${{ matrix.service }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  scan:
    name: trivy scan ${{ matrix.service }}
    needs: [build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, web]

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/fuse-${{ matrix.service }}@${{ needs.build.outputs[format('digest-{0}', matrix.service)] }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          # CRITICAL only — HIGH would flood the gate until we tune.
          # Bump to 'CRITICAL,HIGH' once the noise is curated.
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        # `always()` so the report lands even on scan failure — security
        # teams need to see what tripped the gate.
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
