[tool.uv]
managed = true
workspace = { members = ["apps/api", "apps/worker"] }

[tool.ruff]
line-length = 100
target-version = "py313"
src = ["."]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["apps"]

[dependency-groups]
dev = [
    "fakeredis[lua]>=2.36.2",
    "ruff>=0.15.12",
]
